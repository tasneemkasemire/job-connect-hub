<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Connect Hub | Login</title>
    <link rel="stylesheet" href="style1.css">

</head>
<body>

<header class="topbar">
  <div class="container nav">
    <img src="Picture1-removebg-preview.png" width="39px" height="30px">
    <a href="../job-connect-hub - Copy/index.html" class="logo">Job <span>Connect Hub</span></a>
    <nav class="nav-links">
      <a href="../job-connect-hub - Copy/index.html">Home</a>
      <a href="../job-connect-hub - Copy/about.html">About</a>
      <a href="../job-connect-hub - Copy/jobs.html">Job Listings</a>
      <a href="../job-connect-hub - Copy/stories.html">Success Stories</a>
      <a href="../job-connect-hub - Copy/faq.html">FAQs</a>
      <a href="../job-connect-hub - Copy/contact.html">Contact</a>
    </nav>
    <div class="nav-actions">
      <a href="../job-connect-hub - Copy/jobs.html" class="btn btn-primary">Explore Jobs</a>
    </div>
  </div>
</header>

<section class="auth-section">
  <div class="card auth-card">
    <div class="auth-header">
      <h2 class="section-title">Welcome Admin</h2>
    </div>

    <form action="../admin-dashboard/admin.html">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="e.g. salim@example.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="remember-me">
        <div>
          <input type="checkbox" id="remember">
          <label for="remember" style="margin:0;">Remember me</label>
        </div>
        <a href="#" style="color: #666; text-decoration: none;">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <div class="auth-footer">
      <p style="margin-top: 10px; font-size: 0.9em; color: #888;">User login <a href="login.html">here</a></p>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <p>&copy; 2026 Job Connect Hub. Your career journey starts with a secure login.</p>
  </div>
</footer>

</body>
</html>
